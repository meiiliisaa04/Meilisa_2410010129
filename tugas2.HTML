<!DOCTYPE html>

<head>

    <title>Formulir Pemesanan</title>
    <link rel="stylesheet" href="style_tugas2.css">
</head>
<body>

<h2>Formulir Pemesanan Produk</h2>

<form>
    <label>Nama Pemesan:</label><br>
    <input type="text"><br><br>

    <label>Alamat Pengiriman:</label><br>
    <textarea></textarea><br><br>

    <label>Metode Pembayaran:</label><br>
    <input type="radio" name="bayar"> Transfer Bank<br>
    <input type="radio" name="bayar"> Kartu Kredit<br>
    <input type="radio" name="bayar"> COD<br><br>

    <button class="btn">Pesan Sekarang</button>
</form>

<h3>Daftar Produk</h3>
<table border="1">
    <tr>
        <th>Nama Produk</th>
        <th>Harga</th>
        <th>Stok</th>
    </tr>

        <td>Keyboard</td>

        <td>12</td>
    </tr>
    <tr>
        <td>Mouse</td>

        <td>30</td>
    </tr>
</table>

</body>
</html>
